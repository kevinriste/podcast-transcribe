[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
preview = true
ignore = [
    "D203",     # blank line before class docstring — conflicts with D211
    "D213",     # multi-line summary on second line — conflicts with D212
    "CPY",      # copyright headers
    "LOG015",   # root logger — standalone scripts, named loggers add noise
    "C901",     # complexity — procedural pipeline scripts
    "PLR0911",  # too many return statements
    "PLR0912",  # too many branches
    "PLR0913",  # too many arguments
    "PLR0914",  # too many local variables
    "PLR0915",  # too many statements
    "PLR0917",  # too many positional arguments
    "PLR1702",  # too many nested blocks
    "PLR2004",  # magic value comparison
    "TRY300",   # try-consider-else
    "COM812",   # trailing comma — conflicts with ruff format
    "E501",     # line too long — ruff format handles this
]

[tool.ruff.format]
skip-magic-trailing-comma = false

[tool.basedpyright]
typeCheckingMode = "all"
pythonVersion = "3.12.8"
